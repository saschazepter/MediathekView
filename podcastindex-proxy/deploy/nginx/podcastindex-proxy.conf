# Beispiel für einen Reverse Proxy vor dem lokalen Podcastindex-Proxy.
# Der Go-Dienst sollte dazu auf 127.0.0.1:18080 lauschen.

server {
    listen 80;
    server_name podcastindex.example.org;

    access_log /var/log/nginx/podcastindex-proxy-access.log;
    error_log /var/log/nginx/podcastindex-proxy-error.log;

    location = /health {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/audiothek/podcast-search {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 404;
    }
}
